<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 280" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="QUEENSYNC">
  <defs>
    <linearGradient id="indigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="indigoSoft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="280" fill="#0a0118"/>

  <!-- subtle grid -->
  <g stroke="#1e1b4b" stroke-width="1" opacity="0.55">
    <path d="M0 70 H1400 M0 140 H1400 M0 210 H1400"/>
    <path d="M140 0 V280 M280 0 V280 M420 0 V280 M560 0 V280 M700 0 V280 M840 0 V280 M980 0 V280 M1120 0 V280 M1260 0 V280"/>
  </g>

  <!-- torii bookends -->
  <g fill="url(#indigoSoft)" opacity="0.85">
    <g transform="translate(40,90)">
      <rect x="0" y="0" width="80" height="10"/>
      <rect x="6" y="14" width="68" height="6"/>
      <rect x="14" y="22" width="8" height="68"/>
      <rect x="58" y="22" width="8" height="68"/>
      <rect x="30" y="44" width="20" height="6"/>
    </g>
    <g transform="translate(1280,90)">
      <rect x="0" y="0" width="80" height="10"/>
      <rect x="6" y="14" width="68" height="6"/>
      <rect x="14" y="22" width="8" height="68"/>
      <rect x="58" y="22" width="8" height="68"/>
      <rect x="30" y="44" width="20" height="6"/>
    </g>
  </g>

  <!-- title -->
  <text x="700" y="170"
        text-anchor="middle"
        font-family="'Courier New', ui-monospace, Menlo, monospace"
        font-weight="900"
        font-size="138"
        letter-spacing="14"
        fill="url(#indigo)"
        filter="url(#glow)">QUEENSYNC</text>

  <!-- subtitle -->
  <text x="700" y="222"
        text-anchor="middle"
        font-family="'Courier New', ui-monospace, Menlo, monospace"
        font-size="20"
        letter-spacing="8"
        fill="#a78bfa"
        opacity="0.9">// THE  PALACE  IS  OPEN //</text>

  <!-- bottom tagline -->
  <text x="700" y="256"
        text-anchor="middle"
        font-family="'Courier New', ui-monospace, Menlo, monospace"
        font-size="14"
        letter-spacing="4"
        fill="#6366f1"
        opacity="0.75">resonance control protocol  ·  v2.0  ·  kannaka constellation</text>
</svg>
