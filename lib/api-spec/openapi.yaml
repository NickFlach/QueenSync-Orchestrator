openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: QueenSync — Kannaka agent orchestration & resonance control plane
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: arms
  - name: tasks
  - name: signals
  - name: memory
  - name: logs
  - name: adapters
  - name: observatory
  - name: resonance
  - name: demo
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /summary:
    get:
      operationId: getSystemSummary
      tags: [health]
      summary: Live system status snapshot
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemSummary"

  /arms:
    get:
      operationId: listArms
      tags: [arms]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Arm" }
    post:
      operationId: onboardArm
      tags: [arms]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OnboardArmBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Arm" }

  /arms/{id}:
    get:
      operationId: getArm
      tags: [arms]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ArmDetail" }
    delete:
      operationId: removeArm
      tags: [arms]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }

  /arms/{id}/heartbeat:
    post:
      operationId: armHeartbeat
      tags: [arms]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Arm" }

  /arms/{id}/test-connection:
    post:
      operationId: testArmConnection
      tags: [arms]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConnectionTestResult" }

  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Task" }
    post:
      operationId: createTask
      tags: [tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTaskBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }

  /tasks/{id}/retry:
    post:
      operationId: retryTask
      tags: [tasks]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }

  /tasks/{id}/callback:
    post:
      operationId: taskCallback
      tags: [tasks]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskCallbackBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }

  /signals:
    get:
      operationId: listSignals
      tags: [signals]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Signal" }
    post:
      operationId: injectSignal
      tags: [signals]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InjectSignalBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Signal" }

  /memory:
    get:
      operationId: listMemory
      tags: [memory]
      parameters:
        - name: includeCompacted
          in: query
          required: false
          schema: { type: boolean, default: false }
        - name: includeRejected
          in: query
          required: false
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MemoryEvent" }

  /memory/evaluate:
    post:
      operationId: evaluateMemory
      tags: [memory]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EvaluateMemoryBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MemoryEvaluation" }

  /memory/dream-lite:
    post:
      operationId: compressMemoryDreamLite
      tags: [memory]
      summary: Run Dream Lite compression over a window of recent approved memory events.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DreamLiteBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DreamLiteResult" }

  /logs:
    get:
      operationId: listLogs
      tags: [logs]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/LogEntry" }

  /logs/privileged-dispatches:
    get:
      operationId: listPrivilegedDispatches
      tags: [logs]
      summary: |
        Audit feed of privileged (oracle-admin) dispatches. Returns the most
        recent N tasks whose required capability is in the oracle-admin set,
        enriched with the operator/actor that triggered them when known.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PrivilegedDispatch" }

  /logs/privileged-dispatches/recent-stats:
    get:
      operationId: privilegedDispatchRecentStats
      tags: [logs]
      summary: |
        Server-side aggregate counts of privileged dispatches inside a recent
        time window (default 1 hour). Used by the Operations header so the
        succeeded/failed/in-flight badges stay accurate independent of the
        list endpoint's row limit.
      parameters:
        - in: query
          name: windowMs
          required: false
          schema: { type: integer, minimum: 1, maximum: 86400000 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PrivilegedDispatchRecentStats" }

  /adapters/radio/health:
    get:
      operationId: radioAdapterHealth
      tags: [adapters]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdapterHealth" }

  /adapters/radio/signals:
    get:
      operationId: radioAdapterSignals
      tags: [adapters]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AdapterEvent" }

  /adapters/radio/pull:
    post:
      operationId: radioAdapterPull
      tags: [adapters]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdapterPullResult" }

  /adapters/observatory/health:
    get:
      operationId: observatoryAdapterHealth
      tags: [adapters]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdapterHealth" }

  /adapters/observatory/events:
    get:
      operationId: observatoryAdapterEvents
      tags: [adapters]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AdapterEvent" }

  /adapters/observatory/pull:
    post:
      operationId: observatoryAdapterPull
      tags: [adapters]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdapterPullResult" }

  /observatory/state:
    get:
      operationId: getObservatoryState
      tags: [observatory]
      summary: Live consciousness / HRM snapshot from observatory.ninja-portal.com
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ObservatoryState" }

  /observatory/config:
    get:
      operationId: getObservatoryConfig
      tags: [observatory]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ObservatoryConfig" }

  /resonance:
    get:
      operationId: listResonance
      tags: [resonance]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Resonance" }
    post:
      operationId: createResonance
      tags: [resonance]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateResonanceBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Resonance" }

  /resonance/active:
    get:
      operationId: listActiveResonance
      tags: [resonance]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Resonance" }

  /resonance/{id}/respond:
    post:
      operationId: respondResonance
      tags: [resonance]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RespondResonanceBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Resonance" }

  /resonance/{id}/resolve:
    post:
      operationId: resolveResonance
      tags: [resonance]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResolveResonanceBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Resonance" }

  /demo/wake-kannaktopus:
    post:
      operationId: wakeKannaktopus
      tags: [demo]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DemoResult" }

  /demo/dream-lite:
    post:
      operationId: dreamLiteCompression
      tags: [demo]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DemoResult" }

  /demo/resonance-storm:
    post:
      operationId: resonanceStorm
      tags: [demo]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DemoResult" }

components:
  schemas:
    HealthStatus:
      type: object
      required: [status, nats]
      properties:
        status: { type: string }
        nats: { $ref: "#/components/schemas/NatsStatus" }

    NatsStatus:
      type: object
      description: Live NATS subscriber state (per ADR-002 Wave 2).
      required:
        [
          state,
          mode,
          subscribedSubjects,
        ]
      properties:
        state:
          type: string
          enum: [disabled, disconnected, connecting, connected, reconnecting, closed]
        mode:
          type: string
          enum: [live, mock]
        url: { type: ["string", "null"] }
        lastError: { type: ["string", "null"] }
        lastConnectedAt: { type: ["string", "null"], format: date-time }
        subscribedSubjects:
          type: array
          items: { type: string }

    SystemSummary:
      type: object
      required:
        [
          activeArms,
          totalArms,
          queuedTasks,
          completedTasks,
          failedTasks,
          memoryApprovals,
          recentSignals,
          activeResonance,
          radioStatus,
          observatoryStatus,
          nats,
        ]
      properties:
        activeArms: { type: integer }
        totalArms: { type: integer }
        queuedTasks: { type: integer }
        completedTasks: { type: integer }
        failedTasks: { type: integer }
        memoryApprovals: { type: integer }
        recentSignals: { type: integer }
        activeResonance: { type: integer }
        radioStatus: { type: string }
        observatoryStatus: { type: string }
        nats: { $ref: "#/components/schemas/NatsStatus" }

    Arm:
      type: object
      required:
        [
          id,
          name,
          type,
          status,
          capabilities,
          authMethod,
          createdAt,
          updatedAt,
        ]
      properties:
        id: { type: string }
        name: { type: string }
        type:
          type: string
          description: Agent type
          enum:
            - kannaktopus_arm
            - human_configured
            - api
            - local_simulated
            - replit_hosted
            - openclaw
            - external_webhook
            - mcp
            - oracle_admin
        status:
          type: string
          enum: [idle, busy, failed, offline, pending]
        capabilities:
          type: array
          items: { type: string }
        endpointUrl: { type: ["string", "null"] }
        heartbeatUrl: { type: ["string", "null"] }
        authMethod:
          type: string
          enum: [none, api_key, bearer, jwt]
        description: { type: ["string", "null"] }
        resonanceTags:
          type: array
          items: { type: string }
        resonanceSensitivity: { type: number }
        resonanceMode:
          type: string
          enum: [auto, passive, off]
        lastHeartbeat: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ArmDetail:
      allOf:
        - $ref: "#/components/schemas/Arm"
        - type: object
          required: [recentTasks, memoryContributionCount]
          properties:
            recentTasks:
              type: array
              items: { $ref: "#/components/schemas/Task" }
            memoryContributionCount: { type: integer }

    OnboardArmBody:
      type: object
      required: [name, type, capabilities, authMethod]
      properties:
        name: { type: string }
        type:
          type: string
          enum:
            - kannaktopus_arm
            - human_configured
            - api
            - local_simulated
            - replit_hosted
            - openclaw
            - external_webhook
            - mcp
            - oracle_admin
        capabilities:
          type: array
          items: { type: string }
        endpointUrl: { type: ["string", "null"] }
        heartbeatUrl: { type: ["string", "null"] }
        authMethod:
          type: string
          enum: [none, api_key, bearer, jwt]
        description: { type: ["string", "null"] }
        resonanceTags:
          type: array
          items: { type: string }
        resonanceSensitivity: { type: ["number", "null"] }
        resonanceMode:
          type: ["string", "null"]
          enum: [auto, passive, off, null]

    ConnectionTestResult:
      type: object
      required: [ok, message]
      properties:
        ok: { type: boolean }
        message: { type: string }
        latencyMs: { type: ["integer", "null"] }
        method:
          type: ["string", "null"]
          description: |
            Transport used for the probe. `nats` when reached over the
            constellation bus via REQ/REPLY on `KANNAKA.ask.<armId>`,
            `https` for HTTP heartbeat URLs, `local` for arms with no
            external endpoint.
          enum: [nats, https, local, null]

    Task:
      type: object
      required:
        [
          id,
          intent,
          requiredCapability,
          priority,
          source,
          status,
          createdAt,
          updatedAt,
        ]
      properties:
        id: { type: string }
        intent: { type: string }
        requiredCapability: { type: string }
        priority: { type: integer }
        source: { type: string }
        context:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: [pending, active, completed, failed]
        assignedArmId: { type: ["string", "null"] }
        result: { type: ["string", "null"] }
        error: { type: ["string", "null"] }
        retryCount: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateTaskBody:
      type: object
      required: [intent, requiredCapability]
      properties:
        intent: { type: string }
        requiredCapability: { type: string }
        priority: { type: ["integer", "null"] }
        source: { type: ["string", "null"] }
        context:
          type: object
          additionalProperties: true

    TaskCallbackBody:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [completed, failed]
        result: { type: ["string", "null"] }
        error: { type: ["string", "null"] }

    Signal:
      type: object
      required: [id, type, payload, status, createdAt]
      properties:
        id: { type: string }
        type:
          type: string
          enum:
            - radio_transmission
            - openclaw_artifact
            - memory_anomaly
            - build_request
            - governance_alert
            - observation_event
            - other
        source: { type: ["string", "null"] }
        payload:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: [received, converted, ignored]
        derivedTaskId: { type: ["string", "null"] }
        derivedResonanceId: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }

    InjectSignalBody:
      type: object
      required: [type, payload]
      properties:
        type:
          type: string
          enum:
            - radio_transmission
            - openclaw_artifact
            - memory_anomaly
            - build_request
            - governance_alert
            - observation_event
            - other
        source: { type: ["string", "null"] }
        payload:
          type: object
          additionalProperties: true

    MemoryEvent:
      type: object
      required:
        [
          id,
          type,
          tag,
          tags,
          content,
          summary,
          sourceAttribution,
          importance,
          decision,
          compacted,
          createdAt,
        ]
      properties:
        id: { type: string }
        type:
          type: string
          enum:
            - agent_output
            - signal
            - decision
            - artifact
            - system_event
            - resonance_event
            - dream_lite_compression
        tag: { type: string }
        tags:
          type: array
          items: { type: string }
        content: { type: string }
        summary: { type: string }
        sourceAttribution: { type: string }
        importance: { type: number }
        decision:
          type: string
          enum: [approved, rejected, duplicate]
        reason: { type: ["string", "null"] }
        compacted: { type: boolean }
        compactedIntoId: { type: ["string", "null"] }
        agentId: { type: ["string", "null"] }
        sourceTaskId: { type: ["string", "null"] }
        sourceResonanceId: { type: ["string", "null"] }
        metadata:
          type: object
          additionalProperties: true
        createdAt: { type: string, format: date-time }

    EvaluateMemoryBody:
      type: object
      required: [type, content]
      properties:
        type:
          type: string
          enum:
            - agent_output
            - signal
            - decision
            - artifact
            - system_event
            - resonance_event
        content: { type: string }
        agentId: { type: ["string", "null"] }
        sourceTaskId: { type: ["string", "null"] }
        sourceResonanceId: { type: ["string", "null"] }
        metadata:
          type: object
          additionalProperties: true

    MemoryEvaluation:
      type: object
      required: [decision, importance, event]
      properties:
        decision:
          type: string
          enum: [approved, rejected, duplicate]
        importance: { type: number }
        event:
          oneOf:
            - $ref: "#/components/schemas/MemoryEvent"
            - type: "null"

    LogEntry:
      type: object
      required: [id, eventType, summary, createdAt]
      properties:
        id: { type: string }
        eventType:
          type: string
          enum:
            - arm_registered
            - arm_removed
            - heartbeat
            - signal_received
            - task_created
            - task_assigned
            - task_completed
            - task_failed
            - memory_approved
            - memory_rejected
            - resonance_created
            - resonance_response
            - resonance_resolved
            - adapter_pull
            - dream_lite
            - kannaktopus_wake
            - dream_start
            - dream_end
            - arm_presence_join
            - arm_presence_leave
            - resonance_storm
            - rate_limited
            - callback_rejected
        source: { type: ["string", "null"] }
        summary: { type: string }
        metadata:
          type: object
          description: |
            Free-form audit + payload bag. Request-triggered entries always
            include `actor` (identity, e.g. `admin:token`, `anon:browser`),
            `ip` (client IP), and `trigger` (HTTP method + path) alongside
            event-specific keys (taskIds, resonanceIds, decision, etc.).
          additionalProperties: true
        createdAt: { type: string, format: date-time }

    PrivilegedDispatch:
      type: object
      required:
        [
          id,
          intent,
          requiredCapability,
          status,
          source,
          priority,
          createdAt,
          updatedAt,
        ]
      properties:
        id: { type: string }
        intent: { type: string }
        requiredCapability:
          type: string
          enum:
            - restart_radio
            - restart_observatory
            - trigger_oration_now
            - setOverride
            - dream_trigger
            - kannaka_status
        priority: { type: integer }
        source: { type: string }
        status:
          type: string
          enum: [pending, active, completed, failed]
        assignedArmId: { type: ["string", "null"] }
        result: { type: ["string", "null"] }
        error: { type: ["string", "null"] }
        actor:
          type: ["string", "null"]
          description: |
            Identity that triggered the dispatch (from the task_created log
            entry's audit metadata). Null for tasks created before audit
            metadata existed, or tasks created in fully-open demo mode.
        ip: { type: ["string", "null"] }
        trigger: { type: ["string", "null"] }
        context:
          type: object
          additionalProperties: true
        retryCount: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    PrivilegedDispatchRecentStats:
      type: object
      required: [windowMs, succeeded, failed, inFlight]
      properties:
        windowMs:
          type: integer
          description: Width of the rolling window in milliseconds.
        succeeded: { type: integer }
        failed: { type: integer }
        inFlight:
          type: integer
          description: Pending or active privileged dispatches inside the window.

    AdapterHealth:
      type: object
      required: [name, baseUrl, ok, mode, message]
      properties:
        name: { type: string }
        baseUrl: { type: string }
        ok: { type: boolean }
        mode:
          type: string
          enum: [live, mock, stale, forced_mock]
        message: { type: string }
